<!-- AI RETOUCH WARNING -->
<section class="ai-warning-overlay" id="aiWarning">

  <div class="ai-warning-card">

    <div class="warning-top">
      OFFICIAL NOTICE
    </div>

    <h1>
      Excessive AI Retouch Detected
    </h1>

    <p class="warning-description">
      Artificially modified or AI-generated facial images
      may not be accepted for official identification,
      passport, visa, or resident registration documents.
    </p>

    <div class="warning-highlight">
      Keep your real appearance.
    </div>

    <div class="warning-example">

      <div class="warning-item">
        <img
          src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=800"
          alt=""
        />
        <span>Original Photo</span>
      </div>

      <div class="warning-arrow">
        →
      </div>

      <div class="warning-item invalid">
        <img
          src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=800"
          alt=""
        />
        <span>AI Retouched</span>
      </div>

    </div>

    <div class="warning-buttons">

      <button class="primary-btn">
        Continue Editing
      </button>

      <button class="secondary-btn">
        Restore Natural Look
      </button>

    </div>

  </div>

</section>
