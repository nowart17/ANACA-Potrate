<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANACA — AI 시네마틱 카메라</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: 'Pretendard', system-ui, sans-serif;
    }
    .hero-bg {
      background: radial-gradient(circle at 50% 30%, rgba(234, 179, 8, 0.15), transparent 60%);
    }
    .sdr-dial {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sdr-dial:hover {
      transform: scale(1.08) rotate(8deg);
      filter: brightness(1.2);
    }
    .glow {
      box-shadow: 0 0 60px -10px rgb(234 179 8),
                  0 0 30px -5px rgb(234 179 8);
    }
  </style>
</head>
<body class="bg-black text-white overflow-x-hidden">
  <div class="min-h-screen hero-bg">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/10">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-2xl font-bold tracking-tighter">ANACA</span>
        </div>
        <div class="hidden md:flex items-center gap-8 text-sm">
          <a href="#" class="hover:text-yellow-400 transition">기능</a>
          <a href="#" class="hover:text-yellow-400 transition">갤러리</a>
          <a href="#" class="hover:text-yellow-400 transition">기술</a>
          <a href="#" class="hover:text-yellow-400 transition">커뮤니티</a>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 pt-32 pb-20 grid md:grid-cols-2 gap-16 items-center">
      <!-- Left Content -->
      <div class="space-y-8">
        <div class="inline-block bg-white/10 text-yellow-400 text-sm px-5 py-2 rounded-full border border-white/20">
          AI 시네마틱 카메라 운영 체제
        </div>

        <h1 class="text-6xl md:text-7xl font-bold leading-none tracking-tighter">
          현실을 초월하여<br>
          <span class="text-yellow-400">촬영하세요</span>
        </h1>

        <p class="text-xl text-gray-300 max-w-lg">
          ANACA는 AI 기반 이미지 생성을 영화 같은 카메라 경험으로 바꿉니다.<br>
          단순한 엔지니어가 아닌, 영화감독처럼 장면을 연출하세요.
        </p>

        <div class="flex flex-wrap gap-4">
          <button onclick="startANACA()" 
                  class="bg-yellow-400 hover:bg-yellow-300 text-black font-semibold px-8 py-4 rounded-2xl text-lg transition flex items-center gap-3">
            <i class="fas fa-play"></i>
            ANACA를 시작하세요
          </button>
          
          <button onclick="showSDRDial()" 
                  class="border border-white/30 hover:border-white/60 font-medium px-8 py-4 rounded-2xl text-lg transition">
            SDR 다이얼 살펴보기
          </button>
        </div>

        <div class="flex items-center gap-8 text-sm text-gray-400 pt-6">
          <div>기초적인</div>
          <div class="w-px h-6 bg-white/20"></div>
          <div>찬성</div>
          <div class="w-px h-6 bg-white/20"></div>
          <div>사진관</div>
          <div class="w-px h-6 bg-white/20"></div>
          <div>감독</div>
        </div>
      </div>

      <!-- Right Side - Realistic SDR Dial -->
      <div class="relative flex justify-center md:justify-end">
        <div class="relative">
          <!-- Main Dial -->
          <div id="dial" 
               onclick="rotateDial()" 
               class="sdr-dial w-80 h-80 rounded-full border-8 border-gray-800 bg-gradient-to-br from-gray-900 to-black shadow-2xl cursor-pointer relative glow">
            
            <!-- Outer Ring -->
            <div class="absolute inset-4 rounded-full border-4 border-gray-700"></div>
            
            <!-- Inner Metal Look -->
            <div class="absolute inset-8 rounded-full bg-gradient-to-br from-zinc-800 via-gray-900 to-black flex items-center justify-center">
              
              <!-- Center Logo -->
              <div class="text-center">
                <div class="text-yellow-400 text-3xl font-bold tracking-widest mb-1">SDR</div>
                <div class="text-[10px] text-gray-500 tracking-widest">SONY DYNAMIC RANGE</div>
                <div class="mt-6 text-red-500">
                  <i class="fas fa-cube text-4xl"></i>
                </div>
              </div>
            </div>

            <!-- Dial Marks -->
            <div class="absolute inset-0">
              <!-- 12 marks -->
              <% for(let i = 0; i < 12; i++) { %>
                <div class="absolute w-1 h-6 bg-gray-400" 
                     style="top: 12%; left: 50%; transform: rotate(<%= i * 30 %>deg) translateY(-140px); transform-origin: bottom center;">
                </div>
              <% } %>
            </div>

            <!-- Highlight -->
            <div class="absolute top-6 left-1/2 w-8 h-1 bg-white/60 rounded-full -translate-x-1/2 blur-sm"></div>
          </div>

          <!-- Label -->
          <div class="text-center mt-6">
            <div class="inline-flex items-center gap-2 bg-white/5 px-5 py-2 rounded-full text-sm">
              <span class="text-yellow-400">●</span>
              <span class="font-medium">SDR 다이얼</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function rotateDial() {
      const dial = document.getElementById('dial');
      dial.style.transform = 'rotate(360deg)';
      setTimeout(() => {
        dial.style.transition = 'none';
        dial.style.transform = 'rotate(0deg)';
        setTimeout(() => {
          dial.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
        }, 50);
      }, 600);
    }

    function showSDRDial() {
      const dial = document.getElementById('dial');
      dial.scrollIntoView({ behavior: "smooth" });
      setTimeout(() => {
        rotateDial();
      }, 800);
    }

    function startANACA() {
      alert("🎥 ANACA 시네마틱 모드가 시작되었습니다!\n\n(실제 앱 연동 준비중)");
    }

    // Tailwind Script
    document.documentElement.style.setProperty('--tw-ring-color', 'rgb(234 179 8)');
  </script>
</body>
</html>
